server {
    listen 8080 default_server;
    listen [::]:8080 default_server;

    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compressão
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Cache agressivo para assets versionados
    location ~* \.(?:js|css|woff2?|ttf|eot|otf|png|jpe?g|gif|webp|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # index.html sem cache (para releases rápidos)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA fallback: todas as rotas → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Healthcheck simples para Cloud Run / Load Balancer
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
