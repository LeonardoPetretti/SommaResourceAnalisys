# Pipeline Google Cloud Build → Artifact Registry → Cloud Run
#
# Uso:
#   gcloud builds submit --config cloudbuild.yaml \
#     --substitutions=\
# _FIREBASE_API_KEY="...",_FIREBASE_AUTH_DOMAIN="...",\
# _FIREBASE_PROJECT_ID="...",_FIREBASE_STORAGE_BUCKET="...",\
# _FIREBASE_MESSAGING_SENDER_ID="...",_FIREBASE_APP_ID="...",\
# _FIREBASE_MEASUREMENT_ID="...",_BOOTSTRAP_ADMIN_EMAIL="..."

substitutions:
  _REGION: southamerica-east1
  _REPOSITORY: apps
  _SERVICE: resource-allocation
  _FIREBASE_API_KEY: ""
  _FIREBASE_AUTH_DOMAIN: ""
  _FIREBASE_PROJECT_ID: ""
  _FIREBASE_STORAGE_BUCKET: ""
  _FIREBASE_MESSAGING_SENDER_ID: ""
  _FIREBASE_APP_ID: ""
  _FIREBASE_MEASUREMENT_ID: ""
  _BOOTSTRAP_ADMIN_EMAIL: ""

steps:
  # 1) Build da imagem com build-args
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - --build-arg=VITE_FIREBASE_API_KEY=${_FIREBASE_API_KEY}
      - --build-arg=VITE_FIREBASE_AUTH_DOMAIN=${_FIREBASE_AUTH_DOMAIN}
      - --build-arg=VITE_FIREBASE_PROJECT_ID=${_FIREBASE_PROJECT_ID}
      - --build-arg=VITE_FIREBASE_STORAGE_BUCKET=${_FIREBASE_STORAGE_BUCKET}
      - --build-arg=VITE_FIREBASE_MESSAGING_SENDER_ID=${_FIREBASE_MESSAGING_SENDER_ID}
      - --build-arg=VITE_FIREBASE_APP_ID=${_FIREBASE_APP_ID}
      - --build-arg=VITE_FIREBASE_MEASUREMENT_ID=${_FIREBASE_MEASUREMENT_ID}
      - --build-arg=VITE_BOOTSTRAP_ADMIN_EMAIL=${_BOOTSTRAP_ADMIN_EMAIL}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:latest
      - .

  # 2) Push para Artifact Registry
  - name: gcr.io/cloud-builders/docker
    id: push-sha
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:${SHORT_SHA}
  - name: gcr.io/cloud-builders/docker
    id: push-latest
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:latest

  # 3) Deploy no Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=256Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:${SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1200s
